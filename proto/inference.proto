syntax = "proto3";
package zllm.inference;

service InferenceService {
  rpc Infer(InferRequest) returns (InferResponse);
  rpc InferStream(InferRequest) returns (stream StreamChunk);
}

message InferRequest {
  string prompt = 1;
  string tenant_id = 2;
  InferConfig config = 3;
}

message InferConfig {
  float temperature = 1;
  uint32 top_k = 2;
  float top_p = 3;
  uint32 max_tokens = 4;
  string grammar = 5;           // FSM grammar (json_schema, regex, bnf)
  repeated string hooks = 6;    // Hook names to activate
}

message InferResponse {
  string text = 1;
  repeated uint32 token_ids = 2;
  InferMetrics metrics = 3;
}

message StreamChunk {
  string token = 1;
  uint32 token_id = 2;
  bool is_final = 3;
  InferMetrics metrics = 4;     // Only populated on final chunk
}

message InferMetrics {
  float ttft_ms = 1;            // Time to first token
  float total_ms = 2;           // Total generation time
  uint32 tokens_generated = 3;
  uint32 reasoning_loops = 4;   // Latent reasoning loops used
  bool early_exit = 5;          // Whether early exit was triggered
  float tokens_per_second = 6;
}

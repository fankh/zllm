name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }} ${{ matrix.accel }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            accel: cpu
            archive_suffix: windows-x86_64-cpu.zip
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            accel: cuda
            archive_suffix: windows-x86_64-cuda.zip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            accel: cpu
            archive_suffix: linux-x86_64-cpu.tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            accel: cuda
            archive_suffix: linux-x86_64-cuda.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            accel: metal
            archive_suffix: macos-aarch64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install CUDA toolkit
        # Linux: minimal install via Jimver (nvcc + cudart), the rest comes
        # from apt below — Jimver's sub-packages parameter can't express
        # CUDA 12's renamed `libcublas-*`/`libcurand-*` packages on Linux.
        # Windows: Jimver knows the right NVIDIA component IDs and installs
        # them cleanly, so list everything we need here.
        if: matrix.accel == 'cuda'
        uses: Jimver/cuda-toolkit@v0.2.18
        with:
          cuda: '12.5.0'
          method: 'network'
          sub-packages: ${{ runner.os == 'Windows'
            && '["nvcc", "cudart", "nvrtc", "nvrtc_dev", "cublas", "cublas_dev", "curand", "curand_dev"]'
            || '["nvcc", "cudart"]' }}

      - name: Install CUDA dev libs (Linux)
        # candle-kernels links -lcublas -lcurand -lcublasLt -lnvrtc at build
        # time. CUDA 12 split these out of the cuda-* apt namespace into
        # libcublas-*/libcurand-* (but nvrtc kept the cuda-* prefix — NVIDIA
        # was inconsistent in the rename). Install the -dev variants so the
        # linker finds the .so symlinks.
        if: matrix.accel == 'cuda' && runner.os == 'Linux'
        run: sudo apt-get install -y libcublas-dev-12-5 libcurand-dev-12-5 cuda-nvrtc-dev-12-5

      - name: Enable MSVC dev shell (Windows CUDA)
        # nvcc needs cl.exe on PATH to compile .cu files into host code.
        # Windows runners have MSVC Build Tools installed but cl.exe is
        # behind vcvars64.bat; this action loads that environment.
        if: matrix.accel == 'cuda' && runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # NB: RUSTFLAGS="" overrides .cargo/config.toml's `target-cpu=native`
      # so the published release binaries stay portable across x86_64
      # microarchitectures (any AVX2-capable CPU). Local dev builds keep
      # the host-tuned flags from .cargo/config.toml.

      - name: Build (CPU)
        if: matrix.accel == 'cpu'
        env:
          RUSTFLAGS: ""
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build (CUDA)
        if: matrix.accel == 'cuda'
        env:
          # No GPU on CI runners — must set compute cap explicitly so
          # candle-kernels' build.rs doesn't call nvidia-smi. 89 = Ada
          # Lovelace; the resulting PTX is forward-compatible to newer
          # arches via JIT, but won't run on cards older than ~RTX 40.
          CUDA_COMPUTE_CAP: '89'
          RUSTFLAGS: ""
        run: cargo build --release --locked --target ${{ matrix.target }} --features cuda

      - name: Build (Metal)
        if: matrix.accel == 'metal'
        env:
          RUSTFLAGS: ""
        run: cargo build --release --locked --target ${{ matrix.target }} --features metal

      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          STAGE="zllm-${{ steps.version.outputs.version }}-${{ matrix.archive_suffix }}"
          STAGE_DIR="${STAGE%.tar.gz}"
          mkdir -p "$STAGE_DIR/configs"
          cp "target/${{ matrix.target }}/release/zllm" "$STAGE_DIR/"
          cp configs/default.toml "$STAGE_DIR/configs/"
          cp README.md LICENSE CHANGELOG.md "$STAGE_DIR/"
          tar czf "$STAGE" "$STAGE_DIR"
          echo "ARCHIVE_PATH=$STAGE" >> "$GITHUB_ENV"
          echo "ARCHIVE_NAME=$STAGE" >> "$GITHUB_ENV"

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $archive = "zllm-$version-${{ matrix.archive_suffix }}"
          $stageDir = $archive -replace '\.zip$', ''
          New-Item -ItemType Directory -Force -Path "$stageDir\configs" | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\zllm.exe" "$stageDir\"
          Copy-Item "configs\default.toml" "$stageDir\configs\"
          Copy-Item README.md, LICENSE, CHANGELOG.md "$stageDir\"
          Compress-Archive -Path "$stageDir\*" -DestinationPath $archive
          "ARCHIVE_PATH=$archive" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ARCHIVE_NAME=$archive" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ env.ARCHIVE_PATH }}
          if-no-files-found: error

  release:
    name: Create GitHub release
    needs: build
    # Run even if some matrix builds failed — ship whatever subset succeeded.
    # If literally zero artifacts were produced, the download/upload steps
    # below will fail loudly (fail_on_unmatched_files: true), which is the
    # correct behavior. Skip only on explicit workflow cancellation.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body_path: CHANGELOG.md
          fail_on_unmatched_files: true
